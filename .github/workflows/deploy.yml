name: Build and Deploy Monexa

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH to server and deploy (git pull + local build)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p "$HOME/monexa/app"
            cd "$HOME/monexa"
            # Ensure repo present
            if [ ! -d "app/.git" ]; then
              git clone https://github.com/${{ github.repository }} app
            else
              cd app && git fetch --all && git reset --hard origin/main && cd ..
            fi

            # Write/refresh compose file (build locally)
            cat > docker-compose.yaml <<'COMPOSE'
            version: '3.8'
            services:
              monexa:
                build:
                  context: ./app
                  dockerfile: Dockerfile
                container_name: monexa
                restart: always
                env_file:
                  - .env
                ports:
                  - "3001:3001"
            COMPOSE

            # Build & up
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker image prune -f
